# Example reverse proxy. Replace the server_name, listen addresses, and TLS paths
# with values from your own tailnet or private network.

server {
    listen 80;
    server_name postoffice.example.internal;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name postoffice.example.internal;

    ssl_certificate /etc/ssl/certs/postoffice.example.internal.crt;
    ssl_certificate_key /etc/ssl/private/postoffice.example.internal.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:postoffice_ssl:10m;
    ssl_session_timeout 10m;

    client_max_body_size 25M;

    location /api/events {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
